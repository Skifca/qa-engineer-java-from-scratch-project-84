bugreports:
  - summary: |
      Невозможность переключения страниц каталога, если поле поиска заполнено
    environment: |
      Google Chrome 147.0.7727.117
      ОС Windows 11 Домашняя 25H2
    steps-to-reproduce: |
      1. Ввести в поле поиска название существующего товара (например, "Red Lipstick").
      2. Попытаться нажать на кнопку “Следующая”, чтобы переключиться на следующую страницу каталога.
    expected-result: |
      Переход на следующую страницу каталога, отображаются только товары, соответствующие запросу.
    actual-result: |
      Кнопка "Следующая" пропала, нет возможности переключиться на следующую страницу каталога.

  - summary: |
      Невозможность переключения страниц каталога, если выбрана категория
    environment: |
      Google Chrome 147.0.7727.117
      ОС Windows 11 Домашняя 25H2
    steps-to-reproduce: |
      1. Выбрать категорию, например "beauty".
      2. Попытаться нажать на кнопку “Следующая”, чтобы переключиться на следующую страницу каталога.
    expected-result: |
      Переход на следующую страницу каталога, отображаются только товары, соответствующие категории.
    actual-result: |
      Кнопка "Следующая" пропала, нет возможности переключиться на следующую страницу каталога.
  
  - summary: |
      Невозможность переключения страниц каталога, если выбран производитель
    environment: |
      Google Chrome 147.0.7727.117
      ОС Windows 11 Домашняя 25H2
    steps-to-reproduce: |
      1. Выбрать производителя, например "Essence".
      2. Попытаться нажать на кнопку “Следующая”, чтобы переключиться на следующую страницу каталога.
    expected-result: |
      Переход на следующую страницу каталога, отображаются только товары, соответствующие производителю.
    actual-result: |
      Кнопка "Следующая" пропала, нет возможности переключиться на следующую страницу каталога.

  - summary: |
      Невозможность переключения страниц каталога при выборе пустой категории
    environment: |
      Google Chrome 147.0.7727.117
      ОС Windows 11 Домашняя 25H2
    steps-to-reproduce: |
      1. Выбрать любую категорию товаров.
      2. Выбрать пустую категорию товаров.
      3. Попытаться нажать на кнопку “Следующая”, чтобы переключиться на следующую страницу каталога.
    expected-result: |
      Есть кнопка "Следующая", для переключения страницы каталога.
    actual-result: |
      Отсутствует кнопка "Следующая", переключение страницы каталога невозможно.

  - summary: |
      Нарушение адаптивности: на мобильной версии невозможно осуществить поиск товаров по ключевым словам
    environment: |
      Google Chrome 147.0.7727.117
      Режим эмуляции iPhone SE в DevTools.
    steps-to-reproduce: |
      1. Включить мобильный вид.
      2. Попробовать найти товар по ключевым словам.
    expected-result: |
      Есть поле "Поиск", в него можно ввести ключевые значения.
    actual-result: |
      Отсутствует поле "Поиск", функция не работает.

  - summary: |
      Нарушение адаптивности: на мобильной версии невозможно осуществить поиск товаров по производителю
    environment: |
      Google Chrome 147.0.7727.117
      Режим эмуляции iPhone SE в DevTools.
    steps-to-reproduce: |
      1. Включить мобильный вид.
      2. Попробовать найти товар по производителю.
    expected-result: |
      Есть чек-бокс с разными производителями, в нем можно выбрать разных производителей.
    actual-result: |
      Нет чек-бокса с разными производителями, функция не работает.

  - summary: |
      Нарушение адаптивности: на мобильной версии невозможно осуществить поиск товаров по наличию
    environment: |
      Google Chrome 147.0.7727.117
      Режим эмуляции iPhone SE в DevTools.
    steps-to-reproduce: |
      1. Включить мобильный вид.
      2. Попробовать найти товар по выключенному чек-боксу "В наличии".
    expected-result: |
      Есть чек-бокс "В наличии", его можно отключить и включить.
    actual-result: |
      Нет чек-бокса "В наличии", функция не работает.

  - summary: |
      Нарушение адаптивности: на мобильной версии невозможно осуществить поиск товаров по цене
    environment: |
      Google Chrome 147.0.7727.117
      Режим эмуляции iPhone SE в DevTools.
    steps-to-reproduce: |
      1. Включить мобильный вид.
      2. Попробовать найти товар по ценовому диапазону.
    expected-result: |
      Есть окно с диапазоном "Цена", В нем можно задать значение от и до.
    actual-result: |
      Нет окна с диапазоном "Цена", функция не работает.

  - summary: |
      Не работает параметр "В наличии" при выключенном чек-боксе
    environment: |
      Google Chrome 147.0.7727.117
      ОС Windows 11 Домашняя 25H2.
    steps-to-reproduce: |
      1. Попробовать найти товар по выключенному чек-боксу "В наличии".
    expected-result: |
      В каталоге отображаются товары, которых нет в наличии.
    actual-result: |
      В каталоге отображаются все товары, функция наличия товара работает некорректно.

  - summary: |
      Невозможность переключения страниц каталога при выключенном чек-боксе "В наличии"
    environment: |
      Google Chrome 147.0.7727.117
      ОС Windows 11 Домашняя 25H2.
    steps-to-reproduce: |
      1. Выключить чек-бокс "В наличии".
      2. Попытаться нажать на кнопку “Следующая”, чтобы переключиться на следующую страницу каталога.
    expected-result: |
      Есть кнопка "Следующая", для переключения страницы каталога.
    actual-result: |
      Отсутствует кнопка "Следующая", переключение страницы каталога невозможно.
