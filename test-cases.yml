---
- summary: |
    Успешное добавление товара в корзину из каталога
  requirement: |
    Пользователь должен иметь возможность добавлять товары в корзину
  prerequisites: |
    Открыта главная страница сайта с каталогом товаров
  test-data: |
    Товар: "Red Lipstick"
  steps:
    - Нажать кнопку "В корзину" на карточке товара "Red Lipstick"
    - Нажать на кнопку "Корзина" для перехода к списку покупок
  expected-result: |
    В корзине отображается товар "Red Lipstick" в количестве 1 шт.

- summary: |
    Успешное удаление товара из корзины
  requirement: |
    Пользователь cможет удалить товар из корзины
  prerequisites: |
    В корзину добавлен товар "Red Lipstick", открыта страница корзины
  test-data: |
    Товар в корзине: "Red Lipstick"
  steps:
    - Нажать кнопку удаления рядом с товаром "Red Lipstick"
  expected-result: |
    Товар "Red Lipstick" отсутствует в списке товаров корзины

- summary: |
    Поиск товаров по ключевому слову
  requirement: |
    Пользователь должен иметь возможность искать товары по ключевому слову
  prerequisites: |
    Открыта главная страница сайта
  test-data: |
    Поисковый запрос: "Red Lipstick"
  steps:
    - Ввести "Red Lipstick" в поле поиска
  expected-result: |
    На странице отображаются только те товары, в названии которых присутствует слово "Red Lipstick"

- summary: |
    Фильтрация товаров по категории
  requirement: |
    Пользователь должен иметь возможность фильтровать товары
  prerequisites: |
    Открыта страница каталога со всеми товарами
  test-data: |
    Категория: "beauty"
  steps:
    - Выбрать в блоке категорий "beauty"
  expected-result: |
    В списке товаров отображаются только товары, принадлежащие к категории "beauty"

- summary: |
    Переключение языка интерфейса на английский
  requirement: |
    Пользователь должен иметь возможность переключить язык интерфейса
  prerequisites: |
    Открыта любая страница сайта, установлен русский язык
  test-data: |
    Выбор языка: "English"
  steps:
    - Нажать на кнопку "Язык"
    - Выбрать из предложенных языков "English"
  expected-result: |
    Заголовки меню и текст на кнопках (например, "Cart", "Search") отображаются на английском языке

- summary: |
    Просмотр подробной информации о товаре
  requirement: |
    Пользователь должен иметь возможность просматривать подробную информацию о товаре
  prerequisites: |
    Открыта страница каталога
  test-data: |
    Товар: "Red Lipstick"
  steps:
    - Нажать на карточку товара "Red Lipstick"
  expected-result: |
    Открылась страница товара, на которой отображены название, рейтинг, цена со скидкой и цена без скидки
