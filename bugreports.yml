    Отображаются только товары, соответствующие выбранному производителю.
  actual-result: |
    Результат поиска сбрасывается при переходе на следующую страницу.

- summary: |
    Кнопка переключения языка не имеет картинку с флагом
  environment: |
    Google Chrome 147.0.7727.117
    ОС Windows 11 Домашняя 25H2
  steps-to-reproduce: |
    1. Нажать на кнопку переключения языка и навестись на “English”.
  expected-result: |
    Корректно отображаются флаги напротив нужного языка.
  actual-result: |
    Рядом с языком “English” отсутствует флаг.

- summary: |
    Кнопка переключения языка не меняет локализацию товаров
  environment: |
    Google Chrome 147.0.7727.117
    ОС Windows 11 Домашняя 25H2
  steps-to-reproduce: |
    1. Нажать на кнопку переключения языка и выбрать “Russian” или “Spanish”.
  expected-result: |
    Язык товаров и их описания меняются на выбранный.
  actual-result: |
    Язык товаров и их описания не меняются на выбранный.

- summary: |
    Обновление страницы меняет локализацию страницы
  environment: |
    Google Chrome 147.0.7727.117
    ОС Windows 11 Домашняя 25H2
  steps-to-reproduce: |
    1. Нажать на кнопку переключения языка и выбрать “Russian” или “Spanish”.
    2. Обновить страницу.
  expected-result: |
    Локализация страницы остается той, которую мы выбирали ранее.
  actual-result: |
    Локализация страницы возвращается на английскую версию.

- summary: |
    Невозможность оформления заказа
  environment: |
    Google Chrome 147.0.7727.117
    ОС Windows 11 Домашняя 25H2
  steps-to-reproduce: |
    1. Выбрать любой товар из каталога и добавить его в корзину.
    2. Перейти в корзину и оформить заказ.
  expected-result: |
    Корзина очистилась, заказ успешно оформлен.
  actual-result: |
    Корзина не очистилась, заказ не оформился (Error 500).

- summary: |
    Нарушение адаптивности: мобильная версия сайта не пригодна для использования
  environment: |
    Google Chrome 147.0.7727.117
    Режим эмуляции iPhone SE в DevTools.
  steps-to-reproduce: |
    1. Включить мобильный вид.
    2. Попробовать найти и купить товар.
  expected-result: |
    Интерфейс полностью адаптирован под узкий экран.
  actual-result: |
    Элементы накладываются друг на друга, появился горизонтальный скролл.

- summary: |
    Невозможность убрать категорию
  environment: |
    Google Chrome 147.0.7727.117
    ОС Windows 11 Домашняя 25H2
  steps-to-reproduce: |
    1. Выбрать любую категорию товаров.
    2. Попытаться убрать категорию.
  expected-result: |
    Есть пустая строчка в списке категорий, ее можно выбрать.
  actual-result: |
    Нет пустой строчки в списке категорий, убрать категорию нельзя.

- summary: |
    Невозможность вернуться на главную, нажав на лого магазина
  environment: |
    Google Chrome 147.0.7727.117
    ОС Windows 11 Домашняя 25H2
  steps-to-reproduce: |
    1. Перейти в корзину.
    2. Нажать на логотип магазина.
  expected-result: |
    Осуществляется переход на главную страницу.
  actual-result: |
    Перехода на главную страницу нет.

- summary: |
    Некорректно функционирует поле "Производитель" при переключение страниц
  environment: |
    Google Chrome 147.0.7727.117
    ОС Windows 11 Домашняя 25H2
  steps-to-reproduce: |
    1. Выбрать в поле "Производитель" пустое значение.
    2. Нажать на кнопку "Следующая".
  expected-result: |
    Осуществляется переход на следующую страницу, поле "Производитель" отображается корректно.
  actual-result: |
    Осуществляется переход на следующую страницу, поле "Производитель" отображается некорректно.
