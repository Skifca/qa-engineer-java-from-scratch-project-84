---
- summary: |
    Некорректная работа поиска по ключевому слову
  environment: |
    Google Chrome 147.0.7727.117
    ОС Windows 11 Домашняя 25H2
  steps-to-reproduce: |
    1. Ввести в поле поиска название существующего товара (например, "Red Lipstick").
    2. Нажать на кнопку “Следующая”, чтобы переключиться на следующую страницу.
    3. Проверить выдачу.
  expected-result: |
    Отображаются только товары, соответствующие запросу.
  actual-result: |
    Результат поиска сбрасывается при переходе на следующую страницу.

- summary: |
    Некорректная работа поиска по категории
  environment: |
    Google Chrome 147.0.7727.117
    ОС Windows 11 Домашняя 25H2
  steps-to-reproduce: |
    1. Выбрать категорию “beauty”.
    2. Нажать на кнопку “Следующая”, чтобы переключиться на следующую страницу.
    3. Проверить выдачу.
  expected-result: |
    Отображаются только товары, соответствующие выбранной категории.
  actual-result: |
    Результат поиска сбрасывается при переходе на следующую страницу.

- summary: |
    Некорректная работа поиска по производителю
  environment: |
    Google Chrome 147.0.7727.117
    ОС Windows 11 Домашняя 25H2
  steps-to-reproduce: |
    1. Выбрать производителя “Essence”.
    2. Нажать на кнопку “Следующая”, чтобы переключиться на следующую страницу.
